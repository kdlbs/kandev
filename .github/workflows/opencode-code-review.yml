            echo
            echo "Code review skill from base commit:"
            echo
            git show "$BASE_SHA:.agents/skills/code-review/SKILL.md" 2>/dev/null | sed -n '1,220p' || echo "(code-review skill not present in base commit)"
          } > /tmp/opencode-review-guidelines.md

          {
