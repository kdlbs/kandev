[tools]
node = "24"
pnpm = "9.15.9"
go = "1.26.0"
jq = "latest"
ripgrep = "latest"
uv = "latest"
golangci-lint = "2.9.0"
git-cliff = "2.13.1"
"go:github.com/google/go-licenses" = { version = "v1.6.0", depends = "go" }
"pipx:pre-commit" = { version = "latest", depends = "uv" }

[env]
NODE_OPTIONS = "--dns-result-order=ipv4first"
_.path = ["./apps/node_modules/.bin"]
